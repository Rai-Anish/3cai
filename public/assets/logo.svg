    <circle cx="55" cy="-63" r="4" style="fill:rgb(255, 107, 152);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Subtle connector spokes -->
    <line x1="0" y1="-22" x2="0" y2="-54" stroke="#e9ffb9" stroke-width="0.5" opacity="0.2" style="fill:rgb(0, 0, 0);stroke:rgb(233, 255, 185);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.2;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="22" y1="0" x2="48" y2="0" stroke="#ac89ff" stroke-width="0.5" opacity="0.3" style="fill:rgb(0, 0, 0);stroke:rgb(172, 137, 255);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="-22" y1="0" x2="-48" y2="0" stroke="#e9ffb9" stroke-width="0.5" opacity="0.1" style="fill:rgb(0, 0, 0);stroke:rgb(233, 255, 185);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="0" y1="22" x2="0" y2="54" stroke="#e9ffb9" stroke-width="0.5" opacity="0.15" style="fill:rgb(0, 0, 0);stroke:rgb(233, 255, 185);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>
